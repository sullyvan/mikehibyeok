<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELF PORTRAITS — MIKEHIBYEOK</title>
<meta name="description" content="The self-portrait archive. A daily photography practice focused on hair, 2014 to now.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d0d0d;
    --panel: #161616;
    --text: #f2f2f2;
    --dim: #888;
    --accent: #c8ff00;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  }

  /* ---------- header ---------- */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,13,13,.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #222;
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 18px 24px;
  }
  .wordmark {
    font-size: 22px; font-weight: 900; letter-spacing: .18em;
    color: var(--text); text-decoration: none;
  }
  .wordmark span { color: var(--accent); }
  nav a {
    color: var(--dim); text-decoration: none;
    font-size: 12px; font-weight: 700; letter-spacing: .15em;
    margin-left: 22px;
  }
  nav a:hover { color: var(--accent); }

  /* ---------- intro ---------- */
  .intro { padding: 46px 24px 8px; max-width: 900px; }
  .intro h1 {
    font-size: clamp(26px, 5vw, 44px); font-weight: 900;
    letter-spacing: .04em; line-height: 1.1; text-transform: uppercase;
  }
  .intro h1 em { font-style: normal; color: var(--accent); }
  .intro p { color: var(--dim); margin-top: 12px; font-size: 14px; letter-spacing: .04em; }

  /* ---------- filters ---------- */
  .filters { display: flex; flex-wrap: wrap; gap: 8px; padding: 22px 24px 6px; }
  .chip {
    background: none; border: 1px solid #333; color: var(--dim);
    font-size: 11px; font-weight: 700; letter-spacing: .12em;
    padding: 7px 14px; cursor: pointer; text-transform: uppercase;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #000; }

  /* ---------- grid ---------- */
  .grid {
    display: grid; gap: 4px; padding: 16px 24px 60px;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  }
  .tile {
    position: relative; aspect-ratio: 1/1; overflow: hidden;
    background: var(--panel); cursor: pointer; border: 0; padding: 0;
  }
  .tile img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform .25s ease;
  }
  .tile:hover img { transform: scale(1.05); }
  .tile .label {
    position: absolute; inset: auto 0 0 0;
    background: linear-gradient(transparent, rgba(0,0,0,.85));
    color: var(--text); font-size: 11px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; text-align: left;
    padding: 26px 10px 8px; opacity: 0; transition: opacity .2s;
  }
  .tile:hover .label { opacity: 1; }

  footer {
    border-top: 1px solid #222; color: #555;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    padding: 22px 24px 40px;
  }

  /* ---------- lightbox ---------- */
  .lightbox {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.96);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 92vw; max-height: 78vh; object-fit: contain; }
  .lb-meta { margin-top: 16px; text-align: center; }
  .lb-title { font-size: 16px; font-weight: 900; letter-spacing: .1em; text-transform: uppercase; }
  .lb-sub { color: var(--dim); font-size: 12px; letter-spacing: .1em; margin-top: 6px; text-transform: uppercase; }
  .lb-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--dim);
    font-size: 42px; cursor: pointer; padding: 20px; line-height: 1;
  }
  .lb-btn:hover { color: var(--accent); }
  #lbPrev { left: 4px; } #lbNext { right: 4px; }
  #lbClose {
    position: absolute; top: 12px; right: 18px;
    background: none; border: none; color: var(--dim);
    font-size: 30px; cursor: pointer;
  }
  #lbClose:hover { color: var(--accent); }

  @media (max-width: 640px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); padding: 12px 12px 40px; }
    nav a { margin-left: 14px; }
    .lb-btn { font-size: 30px; padding: 10px; }
  }
</style>
</head>
<body>

<header>
  <a class="wordmark" href="../">MIKEHI<span>BYEOK</span></a>
  <nav>
    <a href="../#work">WORK</a>
    <a href="../#video">VIDEO</a>
    <a href="../#about">ABOUT</a>
  </nav>
</header>

<div class="intro" id="top">
  <h1>Self portraits.<br><em>Ten years of hair.</em></h1>
  <p id="statline">A daily practice since 2014. Newest first.</p>
</div>

<div class="filters" id="filters"></div>

<div class="grid" id="grid"></div>

<footer>© 2026 MIKEHIBYEOK · ALL SLOP RESERVED</footer>

<div class="lightbox" id="lightbox">
  <button id="lbClose" aria-label="Close">×</button>
  <button class="lb-btn" id="lbPrev" aria-label="Previous">‹</button>
  <div id="lbMedia"></div>
  <div class="lb-meta">
    <div class="lb-title" id="lbTitle"></div>
    <div class="lb-sub" id="lbSub"></div>
  </div>
  <button class="lb-btn" id="lbNext" aria-label="Next">›</button>
</div>

<script src="sp_manifest.js"></script>
<script>
  const works = window.SP || [];
  document.getElementById('statline').textContent =
    `${works.length} self-portraits, ${works[works.length-1].date.slice(0,4)}–${works[0].date.slice(0,4)}. A daily practice. Newest first.`;

  // --- year filters ---
  const years = ['ALL', ...new Set(works.map(w => String(w.year)))];
  const filtersEl = document.getElementById('filters');
  let activeYear = 'ALL';
  years.forEach(y => {
    const b = document.createElement('button');
    b.className = 'chip' + (y === 'ALL' ? ' active' : '');
    b.textContent = y;
    b.onclick = () => {
      activeYear = y;
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === b));
      renderGrid();
    };
    filtersEl.appendChild(b);
  });

  // --- grid ---
  const gridEl = document.getElementById('grid');
  let visible = [];
  function renderGrid() {
    visible = activeYear === 'ALL' ? works : works.filter(w => String(w.year) === activeYear);
    gridEl.innerHTML = '';
    visible.forEach((w, i) => {
      const t = document.createElement('button');
      t.className = 'tile';
      t.innerHTML = `<img src="${w.file}" alt="${w.title}" loading="lazy">
                     <div class="label">${w.date}</div>`;
      t.onclick = () => openLightbox(i);
      gridEl.appendChild(t);
    });
  }
  renderGrid();

  // --- lightbox ---
  const lb = document.getElementById('lightbox');
  const lbMedia = document.getElementById('lbMedia');
  let current = -1;

  function openLightbox(i) {
    current = i;
    const w = visible[i];
    lbMedia.innerHTML = `<img src="${w.file}" alt="${w.title}">`;
    document.getElementById('lbTitle').textContent = w.title;
    document.getElementById('lbSub').textContent = w.date;
    lb.classList.add('open');
    if (window.goatcounter && window.goatcounter.count)
      window.goatcounter.count({ path: 'selfportrait/' + w.file.replace(/^.*\//, ''), title: w.title, event: true });
  }
  function step(d) {
    if (current < 0) return;
    openLightbox((current + d + visible.length) % visible.length);
  }
  function closeLightbox() {
    lb.classList.remove('open');
    lbMedia.innerHTML = '';
  }
  document.getElementById('lbPrev').onclick = e => { e.stopPropagation(); step(-1); };
  document.getElementById('lbNext').onclick = e => { e.stopPropagation(); step(1); };
  document.getElementById('lbClose').onclick = closeLightbox;
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') step(-1);
    if (e.key === 'ArrowRight') step(1);
  });
</script>
<script data-goatcounter="https://sullyvan.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
